name: npm access check

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm whoami
          npm access list packages jackokerman --json || true
          npm view @jackokerman/oxlint-config version --json || true
          npm access get status @jackokerman/oxlint-config || true
          npm access set status=public @jackokerman/oxlint-config || true
          npm publish --access public --tag latest --provenance
          npm view @jackokerman/oxlint-config version --json
